name: Bandit SAST (Python)

on: [push, workflow_dispatch]

permissions:
  contents: read

jobs:
  bandit:
    name: Bandit Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7 
        with:
          python-version: '3.x'

      - name: Installa Bandit con supporto SARIF
        run: pip install "bandit[sarif]"

      - name: Esegui Bandit
        # non fermiamo la pipeline sui risultati: vogliamo comunque caricare
        # il SARIF su GitHub Security anche se Bandit trova alert (exit code != 0)
        run: |
          bandit -r . \
            -f sarif \
            -o results.sarif \
            --exclude ./.git,./node_modules \
            || true

      - name: Upload dei risultati SARIF per GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: results.sarif
          category: bandit-sast