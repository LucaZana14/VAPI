name: Bandit SAST (Python)

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bandit:
    name: Bandit Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Installa Bandit con supporto SARIF
        run: pip install "bandit[sarif]"

      - name: Esegui Bandit
        # non fermiamo la pipeline sui risultati: vogliamo comunque caricare
        # il SARIF su GitHub Security anche se Bandit trova alert (exit code != 0)
        run: |
          bandit -r . \
            -f sarif \
            -o results.sarif \
            --exclude ./.git,./node_modules \
            || true

      - name: Bonifica SARIF (security-severity mancante nel formatter Bandit)
        if: always()
        run: |
          python3 << 'EOF'
          import json

          LEVEL_RANK = {'note': 0, 'warning': 1, 'error': 2}
          LEVEL_TO_SEVERITY = {'error': '9.0', 'warning': '6.0', 'note': '3.0'}

          with open('results.sarif') as f:
              data = json.load(f)

          updated = 0
          for run in data.get('runs', []):
              rules = run.get('tool', {}).get('driver', {}).get('rules', [])
              best_level_by_rule = {}
              for result in run.get('results', []):
                  rule_id = result.get('ruleId')
                  level = result.get('level', 'warning')
                  if rule_id is None:
                      continue
                  cur = LEVEL_RANK.get(best_level_by_rule.get(rule_id), -1)
                  new = LEVEL_RANK.get(level, -1)
                  if new > cur:
                      best_level_by_rule[rule_id] = level

              for rule in rules:
                  level = best_level_by_rule.get(rule.get('id'))
                  severity = LEVEL_TO_SEVERITY.get(level)
                  if severity is None:
                      continue
                  rule.setdefault('properties', {})['security-severity'] = severity
                  updated += 1

          with open('results.sarif', 'w') as f:
              json.dump(data, f)

          print(f'SARIF Bandit bonificato: security-severity assegnata a {updated} rule.')
          EOF

      - name: Upload dei risultati SARIF per GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: results.sarif
          category: bandit-sast