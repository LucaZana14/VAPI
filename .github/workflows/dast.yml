name: DAST Comprehensive Pipeline (ZAP)
on: [push, workflow_dispatch]
jobs:
  zap-comprehensive-scan:
    name: OWASP ZAP Deep API Scan & Report
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build e Avvio di VAPI (Ambiente Isolato)
        run: |
          docker compose up --build -d

      - name: Attesa readiness del target (healthcheck)
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8081/ > /dev/null; then
              echo "Target pronto dopo ${i} tentativi."
              exit 0
            fi
            sleep 2
          done
          echo "Il target non ha risposto in tempo utile."
          exit 1

      - name: Setup Auth Token (vAPI)
        id: auth
        env:
          # admin1 (id=10) copre anche POST /user, che richiede userid=10
          VAPI_USERNAME: ${{ vars.VAPI_USERNAME || 'admin1' }}
          VAPI_PASSWORD: ${{ secrets.VAPI_PASSWORD || 'pass1' }}
        run: |
          echo "--- Rotte disponibili (openapi.json) ---"
          curl -s http://localhost:8081/openapi.json | jq -r '.paths | keys[]' 2>/dev/null || \
            curl -s http://localhost:8081/openapi.json
          echo "-----------------------------------------"

          TOKEN=""
          for i in {1..10}; do
            LOGIN_RESPONSE=$(curl -s -X POST "http://localhost:8081/tokens" \
              -H "Content-Type: application/json" \
              -d "{\"username\": \"${VAPI_USERNAME}\", \"password\": \"${VAPI_PASSWORD}\"}")
            TOKEN=$(echo "$LOGIN_RESPONSE" | jq -r '.access.token.id // empty')
            if [ -n "$TOKEN" ]; then
              echo "Token ottenuto al tentativo ${i}."
              break
            fi
            echo "Tentativo ${i}: token non ancora disponibile, risposta: $LOGIN_RESPONSE"
            sleep 2
          done

          if [ -z "$TOKEN" ]; then
            echo "Auth token non ottenuto dopo 10 tentativi, interrompo."
            exit 1
          fi
          echo "API_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Creazione configurazione ZAP Automation Avanzata
        env:
          API_TOKEN: ${{ env.API_TOKEN }}
        run: |
          cat << EOF > vampi-zap.yaml
          env:
            contexts:
              - name: VAPI-Context
                urls:
                  - http://localhost:8081
                includePaths:
                  - http://localhost:8081.*
          jobs:
            - type: replacer
              rules:
                - description: Iniezione Auth Token
                  matchType: req_header_str
                  matchString: X-Auth-Token
                  replacementString: ${API_TOKEN}
            - type: openapi
              parameters:
                apiUrl: http://localhost:8081/openapi.json
                targetUrl: http://localhost:8081
            - type: passiveScan-config
            - type: passiveScan-wait
              parameters:
                maxDuration: 5
            - type: activeScan
            - type: passiveScan-wait
              parameters:
                maxDuration: 5
            - type: report
              parameters:
                template: sarif-json
                reportDir: /zap/wrk
                reportFile: results
            - type: report
              parameters:
                template: traditional-html
                reportDir: /zap/wrk
                reportFile: zap-detailed-report
          EOF

      - name: Esecuzione scansione OWASP ZAP
        run: |
          docker run --user root --network host -v ${{ github.workspace }}:/zap/wrk/:rw -t zaproxy/zap-stable zap.sh -cmd -autorun /zap/wrk/vampi-zap.yaml

      - name: Correzione permessi file generati
        if: always()
        run: |
          [ -f results.json ] && sudo chown $USER:$USER results.json || echo "results.json assente, salto."
          [ -f zap-detailed-report.html ] && sudo chown $USER:$USER zap-detailed-report.html || echo "zap-detailed-report.html assente, salto."

      - name: Bonifica SARIF (URI granulari + security-severity)
        if: always()
        run: |
          python3 .github/scripts/clean_zap_sarif.py

      - name: Upload dei risultati SARIF per GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: results.json
          category: owasp-zap-dast

      - name: Salvataggio Report HTML Dettagliato come Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-html-security-report
          path: zap-detailed-report.html
          retention-days: 30