name: DAST Comprehensive Pipeline (ZAP)
on:
  push:
  workflow_dispatch:
  schedule:
    # ogni giorno alle 03:00 UTC esegue uno scan profondo (spider + strength Insane)
    - cron: '0 3 * * *'
jobs:
  zap-comprehensive-scan:
    name: OWASP ZAP Deep API Scan & Report
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build e Avvio di VAPI (Ambiente Isolato)
        run: |
          docker compose up --build -d

      - name: Attesa readiness del target (healthcheck)
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8081/ > /dev/null; then
              echo "Target pronto dopo ${i} tentativi."
              exit 0
            fi
            sleep 2
          done
          echo "Il target non ha risposto in tempo utile."
          exit 1

      - name: Setup Auth Token (vAPI)
        id: auth
        env:
          # admin1 (id=10) copre anche POST /user, che richiede userid=10
          VAPI_USERNAME: ${{ vars.VAPI_USERNAME || 'admin1' }}
          VAPI_PASSWORD: ${{ secrets.VAPI_PASSWORD || 'pass1' }}
        run: |
          echo "--- Rotte disponibili (openapi.json) ---"
          curl -s http://localhost:8081/openapi.json | jq -r '.paths | keys[]' 2>/dev/null || \
            curl -s http://localhost:8081/openapi.json
          echo "-----------------------------------------"

          TOKEN=""
          for i in {1..10}; do
            LOGIN_RESPONSE=$(curl -s -X POST "http://localhost:8081/tokens" \
              -H "Content-Type: application/json" \
              -d "{\"username\": \"${VAPI_USERNAME}\", \"password\": \"${VAPI_PASSWORD}\"}")
            TOKEN=$(echo "$LOGIN_RESPONSE" | jq -r '.access.token.id // empty')
            if [ -n "$TOKEN" ]; then
              echo "Token ottenuto al tentativo ${i}."
              break
            fi
            echo "Tentativo ${i}: token non ancora disponibile, risposta: $LOGIN_RESPONSE"
            sleep 2
          done

          if [ -z "$TOKEN" ]; then
            echo "Auth token non ottenuto dopo 10 tentativi, interrompo."
            exit 1
          fi
          echo "API_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Creazione configurazione ZAP Automation Avanzata
        env:
          API_TOKEN: ${{ env.API_TOKEN }}
          # scan schedulata (cron) = profonda, push/workflow_dispatch = veloce
          IS_DEEP_SCAN: ${{ github.event_name == 'schedule' }}
        run: |
          if [ "$IS_DEEP_SCAN" = "true" ]; then
            echo "Modalita': SCAN PROFONDA (spider attivo, strength Insane)"
            POLICY_STRENGTH="Insane"
            SARIF_CATEGORY="owasp-zap-dast-deep"
            SPIDER_BLOCK=$(cat << 'SPIDER'
            - type: spider
              parameters:
                context: VAPI-Context
                maxDuration: 10
          SPIDER
          )
            # AJAX Spider: usa un browser headless per eseguire JS reale e seguire
            # chiamate dinamiche. Su vAPI (nessun frontend) non trova nulla in piu'
            # dello spider classico, ma lo teniamo attivo per coerenza con progetti
            # futuri che hanno un frontend JS.
            AJAX_SPIDER_BLOCK=$(cat << 'AJAXSPIDER'
            - type: spiderAjax
              parameters:
                context: VAPI-Context
                maxDuration: 10
                browserId: firefox-headless
          AJAXSPIDER
          )
          else
            echo "Modalita': SCAN VELOCE (solo import OpenAPI)"
            POLICY_STRENGTH="High"
            SARIF_CATEGORY="owasp-zap-dast"
            SPIDER_BLOCK=""
            AJAX_SPIDER_BLOCK=""
          fi
          echo "SARIF_CATEGORY=$SARIF_CATEGORY" >> $GITHUB_ENV

          cat << EOF > vampi-zap.yaml
          env:
            contexts:
              - name: VAPI-Context
                urls:
                  - http://localhost:8081
                includePaths:
                  - http://localhost:8081.*
          jobs:
            - type: replacer
              rules:
                - description: Iniezione Auth Token
                  matchType: req_header_str
                  matchString: X-Auth-Token
                  replacementString: ${API_TOKEN}
          $SPIDER_BLOCK
          $AJAX_SPIDER_BLOCK
            - type: openapi
              parameters:
                apiFile: /zap/wrk/openapi/vAPI.yaml
                targetUrl: http://localhost:8081
            - type: passiveScan-config
            - type: passiveScan-wait
              parameters:
                maxDuration: 5
            - type: activeScan-policy
              parameters:
                name: HighPolicy
                policyDefinition:
                  defaultStrength: $POLICY_STRENGTH
                  defaultThreshold: Low
            - type: activeScan
              parameters:
                context: VAPI-Context
                policy: HighPolicy
            - type: passiveScan-wait
              parameters:
                maxDuration: 5
            - type: report
              parameters:
                template: sarif-json
                reportDir: /zap/wrk
                reportFile: results
            - type: report
              parameters:
                template: traditional-html
                reportDir: /zap/wrk
                reportFile: zap-detailed-report
          EOF
          cat vampi-zap.yaml

      - name: Forced browsing con ffuf (solo deep scan)
        if: ${{ github.event_name == 'schedule' }}
        run: |
          go install github.com/ffuf/ffuf/v2@latest
          export PATH=$PATH:$(go env GOPATH)/bin

          # wordlist minimale orientata alle API: path/verbi che uno spider
          # (basato sui link) non puo' scoprire da solo, come /tokens GET
          # non documentato nello spec di vAPI
          cat << 'WORDLIST' > api-wordlist.txt
          tokens
          token
          login
          logout
          auth
          user
          users
          admin
          debug
          health
          status
          config
          backup
          test
          uptime
          widget
          v1
          v2
          api
          docs
          swagger
          openapi
          openapi.json
          .git
          .env
          console
          WORDLIST

          ffuf -w api-wordlist.txt \
            -u http://localhost:8081/FUZZ \
            -mc 200,201,204,301,302,401,403,500 \
            -of json -o ffuf-results.json \
            -t 10

      - name: Salvataggio risultati ffuf come Artifact
        if: ${{ github.event_name == 'schedule' }}
        uses: actions/upload-artifact@v7
        with:
          name: ffuf-forced-browsing-results
          path: ffuf-results.json
          retention-days: 30

      - name: Esecuzione scansione OWASP ZAP
        run: |
          set +e
          docker run --user root --network host -v ${{ github.workspace }}:/zap/wrk/:rw -t zaproxy/zap-stable zap.sh -cmd -autorun /zap/wrk/vampi-zap.yaml
          exit_code=$?
          echo "ZAP exit code: $exit_code"
          # 0 = successo pulito, 2 = automation plan completato con soli warning (es. parametro
          # non riconosciuto da questa versione dell'add-on): non blocchiamo la pipeline.
          # 1 = fallimento reale del plan: qui sì che deve fermarsi.
          if [ "$exit_code" -eq 1 ]; then
            exit 1
          fi
          exit 0

      - name: Correzione permessi file generati
        if: always()
        run: |
          [ -f results.json ] && sudo chown $USER:$USER results.json || echo "results.json assente, salto."
          [ -f zap-detailed-report.html ] && sudo chown $USER:$USER zap-detailed-report.html || echo "zap-detailed-report.html assente, salto."

      - name: Bonifica SARIF (URI granulari + security-severity)
        if: always()
        run: |
          python3 .github/scripts/clean_zap_sarif.py

      - name: Upload dei risultati SARIF per GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: results.json
          category: ${{ env.SARIF_CATEGORY }}

      - name: Salvataggio Report HTML Dettagliato come Artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: zap-html-security-report
          path: zap-detailed-report.html
          retention-days: 30